spring.application.name=gestion-tournois

# MySQL connection
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_tournois?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# Server
server.port=8080

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false

# Uploads (kept off the C: drive to avoid disk-pressure issues)
app.uploads.dir=D:/tournois-data/uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.location=D:/tournois-data/tmp
